<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>홍길동</title> <style>
        /* 2번 지침: 시맨틱 태그 배경색 지정 */
        header {
            background-color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            background-color: skyblue;
            padding: 20px;
        }
        footer {
            background-color: yellow;
            padding: 20px;
        }

        /* 공통 스타일: <br> 없이 문단 나누기 */
        div {
            margin-bottom: 15px;
        }

        /* 4번 지침: 이미지 가로길이 600 지정 */
        img {
            width: 600px;
            display: block;
            margin: 10px 0;
        }

        /* QnA 상세 스타일 */
        summary {
            font-weight: bold;
            cursor: pointer;
        }
        details {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>명함 신청 페이지</h1>
    </header>

    <section>
        <form action="#" method="post">
            <div>
                1. 학년: 
                <select name="grade">
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                </select>
            </div>

            <div>
                2. 반: 
                <select name="class">
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3">3반</option>
                    <option value="4">4반</option>
                </select>
            </div>

            <div>
                3. 번호: <input type="number" name="student-id">
            </div>

            <div>
                4. 이름: <input type="text" name="student-name">
            </div>

            <div>
                5. 원하는 시안 번호 선택
                <img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ
" alt="명함 시안 이미지">
                
                <input type="radio" name="design" value="1"> 1안
                <input type="radio" name="design" value="2"> 2안
                <input type="radio" name="design" value="3"> 3안
                <input type="radio" name="design" value="4"> 4안
                <input type="radio" name="design" value="5"> 5안
                <input type="radio" name="design" value="6"> 6안
                <input type="radio" name="design" value="7"> 7안
                <input type="radio" name="design" value="8"> 8안
            </div>

            <div>
                6. 내가 명함에 넣고 싶은 항목 선택
                <div>
                    <input type="checkbox" name="info" value="name"> 이름
                    <input type="checkbox" name="info" value="email"> 이메일
                </div>
                <div>
                    <input type="checkbox" name="info" value="discord"> 디스코드 아이디
                    <input type="checkbox" name="info" value="github"> 깃헙 아이디
                </div>
                <div>
                    <input type="checkbox" name="info" value="interest"> 관심분야
                    <input type="checkbox" name="info" value="phone"> 휴대폰 번호
                </div>
            </div>

            <div>
                7. 기타 건의사항
                <div>
                    <textarea name="comment" cols="20" rows="10"></textarea>
                </div>
            </div>

            <div>
                <input type="submit" value="전송하기">
                <button type="reset">초기화하기</button>
            </div>
        </form>
    </section>

    <footer>
        <h2>QnA</h2>
        <details>
            <summary>언제까지 내요?</summary>
            <p>3월 11일까지 제출합니다.</p>
        </details>
        <details>
            <summary>명함 얼마에요?</summary>
            <p>무료입니다.</p>
        </details>
        <details>
            <summary>늦게 내면 어떻게 돼요?</summary>
            <p>1학년 전원의 명함발급이 늦어집니다.</p>
        </details>
    </footer>

</body>
</html>
